name: Generate Daily NPE Questions

on:
  schedule:
    # 7:00am AEDT (UTC+11) = 20:00 UTC previous day
    # 7:00am AEST (UTC+10) = 21:00 UTC previous day
    # Running at 20:00 UTC covers AEDT (Oct-Apr)
    # Swap to 21:00 UTC in winter (Apr-Oct) or use a timezone-aware approach
    - cron: '0 20 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run - generate but do not insert into Supabase'
        required: false
        default: 'false'

jobs:
  generate-daily:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci
        working-directory: ./scripts

      - name: Generate daily questions
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          GENERATION_MODE: 'daily'
        run: node scripts/generate-questions.js

      - name: Commit seed file to staging
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config --global user.name 'NPE Quiz Bot'
          git config --global user.email 'npe-bot@users.noreply.github.com'
          git add seed/staging/
          git diff --staged --quiet || git commit -m "chore: daily question set $(date +'%Y-%m-%d')"
          git push
