name: Generate Daily NPE Questions

permissions:
  contents: write

on:
  schedule:
    # 6:00am AEST (UTC+10) = 20:00 UTC previous day
    # Runs Sunday-Thursday UTC, which maps to Monday-Friday 6:00am AEST
    - cron: '0 20 * * 0-4'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run - generate but do not insert into Supabase'
        required: false
        default: 'false'

jobs:
  generate-daily:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: ./scripts

      - name: Generate daily questions
        working-directory: ./scripts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          GENERATION_MODE: 'daily'
        run: node generate-questions.js

      - name: Commit seed file to staging
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config --global user.name 'NPE Quiz Bot'
          git config --global user.email 'npe-bot@users.noreply.github.com'
          git add seed/staging/
          git diff --staged --quiet || git commit -m "chore: daily question set $(date +'%Y-%m-%d')"
          git push origin HEAD:main