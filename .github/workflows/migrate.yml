name: Apply Supabase migrations

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Resolve database URL
        run: |
          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "Missing SUPABASE_DB_URL secret. Set it to your Supabase Connection Pooling URI (recommended) or a valid direct Postgres URI." >&2
            exit 1
          fi

          DB_URL="$SUPABASE_DB_URL"

          DB_HOST=$(python3 -c 'import os, urllib.parse; print(urllib.parse.urlparse(os.environ["SUPABASE_DB_URL"]).hostname or "")')

          if echo "$DB_HOST" | grep -Eq '^db\..*\.supabase\.co$'; then
            echo "SUPABASE_DB_URL is using direct host ($DB_HOST). For GitHub runners in this setup, use a Session pooler URI instead." >&2
            exit 1
          fi

          case "$DB_URL" in
            postgres://*|postgresql://*)
              ;;
            *)
              echo "Invalid SUPABASE_DB_URL. Provide a Postgres DSN (postgres://... or postgresql://...)." >&2
              exit 1
              ;;
          esac

          if echo "$DB_URL" | grep -q '\[YOUR-PASSWORD\]'; then
            echo "SUPABASE_DB_URL still contains [YOUR-PASSWORD]. Replace it with your real DB password." >&2
            exit 1
          fi

          echo "DB_URL resolved from SUPABASE_DB_URL"
          echo "RESOLVED_DB_URL=$DB_URL" >> "$GITHUB_ENV"

      - name: Push migrations
        run: |
          supabase db push --db-url "$RESOLVED_DB_URL"
