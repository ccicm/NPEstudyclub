name: Apply Supabase migrations

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate database URL secret
        run: |
          DB_URL="${SUPABASE_DB_URL:-$DATABASE_URL}"

          if [ -z "$DB_URL" ] && [ -n "$SUPABASE_DB_PASSWORD" ] && [ -n "$SUPABASE_PROJECT_REF" ]; then
            ENCODED_PASSWORD=$(python3 -c 'import os, urllib.parse; print(urllib.parse.quote(os.environ["SUPABASE_DB_PASSWORD"], safe=""))')
            DB_URL="postgresql://postgres:${ENCODED_PASSWORD}@db.${SUPABASE_PROJECT_REF}.supabase.co:5432/postgres?sslmode=require"
          fi

          if [ -z "$DB_URL" ]; then
            echo "Missing DB connection settings. Provide SUPABASE_DB_URL/DATABASE_URL, or SUPABASE_PROJECT_REF + SUPABASE_DB_PASSWORD." >&2
            exit 1
          fi

          case "$DB_URL" in
            postgres://*|postgresql://*)
              ;;
            *)
              echo "Invalid database URL secret. Provide a Postgres DSN like postgres://user:password@host:5432/postgres?sslmode=require." >&2
              exit 1
              ;;
          esac

          if echo "$DB_URL" | grep -q '\[YOUR-PASSWORD\]'; then
            echo "Database URL still contains [YOUR-PASSWORD]. Replace it with the real DB password." >&2
            exit 1
          fi

          echo "DB_URL is set"
          echo "RESOLVED_DB_URL=$DB_URL" >> "$GITHUB_ENV"

      - name: Push migrations
        run: |
          supabase db push --db-url "$RESOLVED_DB_URL"
