name: Apply Supabase migrations

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate database URL secret
        run: |
          DB_URL="${SUPABASE_DB_URL:-$DATABASE_URL}"
          if [ -z "$DB_URL" ]; then
            echo "Missing Supabase database URL secret. Set SUPABASE_DB_URL or DATABASE_URL in GitHub Actions secrets." >&2
            exit 1
          fi

          case "$DB_URL" in
            postgres://*|postgresql://*)
              ;;
            *)
              echo "Invalid database URL secret. Provide a Postgres DSN like postgres://user:password@host:5432/postgres?sslmode=require." >&2
              exit 1
              ;;
          esac

          echo "DB_URL is set"

      - name: Push migrations
        run: |
          DB_URL="${SUPABASE_DB_URL:-$DATABASE_URL}"
          supabase db push --db-url "$DB_URL"
