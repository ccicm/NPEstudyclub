name: Apply Supabase migrations

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    env:
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Resolve database URL
        run: |
          if [ -z "$SUPABASE_DB_PASSWORD" ] || [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "Missing required secrets. Set SUPABASE_PROJECT_REF and SUPABASE_DB_PASSWORD." >&2
            exit 1
          fi

          RAW_REF="$SUPABASE_PROJECT_REF"
          # Accept project ref, project URL, or db host and normalize to plain project ref.
          RAW_REF="${RAW_REF#https://}"
          RAW_REF="${RAW_REF#http://}"
          RAW_REF="${RAW_REF#db.}"
          RAW_REF="${RAW_REF%.supabase.co}"
          RAW_REF="${RAW_REF%%/*}"

          PROJECT_REF="$RAW_REF"

          if [ -z "$PROJECT_REF" ]; then
            echo "Could not parse SUPABASE_PROJECT_REF. Use project ref like ngzsnkzryqzdkkcmujrf." >&2
            exit 1
          fi

          ENCODED_PASSWORD=$(python3 -c 'import os, urllib.parse; print(urllib.parse.quote(os.environ["SUPABASE_DB_PASSWORD"], safe=""))')
          DB_URL="postgresql://postgres:${ENCODED_PASSWORD}@db.${PROJECT_REF}.supabase.co:5432/postgres?sslmode=require"

          case "$DB_URL" in
            postgres://*|postgresql://*)
              ;;
            *)
              echo "Failed to build a valid Postgres DSN." >&2
              exit 1
              ;;
          esac

          echo "DB_URL resolved for project ref $PROJECT_REF"
          echo "RESOLVED_DB_URL=$DB_URL" >> "$GITHUB_ENV"

      - name: Push migrations
        run: |
          supabase db push --db-url "$RESOLVED_DB_URL"
